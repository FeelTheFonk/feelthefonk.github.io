<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake up, Neo...</title>
    <style>
        body {
            background: black;
            color: #0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        .blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        a {
            color: #0f0;
            text-decoration: none;
            border: 1px solid #0f0;
            padding: 10px 20px;
            margin-top: 20px;
            display: inline-block;
        }
        a:hover {
            background: rgba(0, 255, 0, 0.1);
        }
        .text {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text">
            Wake up, Neo...
        </div>
        <div class="text">
            The Matrix has you...
        </div>
        <div class="text">
            Follow the white rabbit<span class="blink">_</span>
        </div>
        <a href="levels/1.html">></a>
    </div>
</body>
</html>
